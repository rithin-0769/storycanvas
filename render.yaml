# Render Blueprint — one-click deploy
# NOTE: Free tier has an ephemeral filesystem. The SQLite file survives
# restarts/spin-downs but is WIPED on every new deploy. For real persistence,
# upgrade to a paid instance + add a persistent Disk (see DEPLOYMENT_GUIDE.md).
services:
  - type: web
    name: storycanvas-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
